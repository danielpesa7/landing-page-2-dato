# Deploy static content to GitHub Pages
# - push to main: build + deploy to https://www.2dato.co
# - pull_request to main or feat/redesign: dry-run build only (no deploy) to catch artifact errors before merge
# - workflow_dispatch: manual deploy from the Actions tab
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main', 'feat/redesign']
  workflow_dispatch:

# Default: read-only at the workflow level. Deploy job elevates per-job.
permissions:
  contents: read

# Single in-flight Pages deployment; queued runs are skipped (latest wins).
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    # Deploy only on push to main (not on pull_request or other refs).
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
