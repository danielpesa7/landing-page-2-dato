# Run formatter + linters (Prettier, ESLint, Stylelint, html-validate) on every PR and main push.
# Fails fast if any check errors. Warnings do not block.
name: Lint

on:
  pull_request:
    branches: ['main', 'feat/redesign']
  push:
    branches: ['main', 'feat/redesign']

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check (prettier + eslint + stylelint + html-validate)
        run: npm run check
